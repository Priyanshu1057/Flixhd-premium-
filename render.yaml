services:
  - type: web
    name: flixhd-premium-bot
    runtime: python
    pythonVersion: "3.11.11"
    rootDir: bot
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /
    plan: free
    envVars:
      # ── Required ──────────────────────────────────────────────────────────
      - key: TELEGRAM_BOT_TOKEN
        sync: false          # Set manually in Render dashboard
      - key: MONGODB_URI
        sync: false
      - key: ADMIN_CHANNEL_ID
        sync: false
      - key: ADMIN_USER_ID
        sync: false
      - key: UPI_ID
        sync: false
      # ── Optional but recommended ──────────────────────────────────────────
      - key: LOG_CHANNEL_ID
        sync: false
      - key: SELF_PING_URL
        sync: false          # Set AFTER first deploy — use the .onrender.com URL
      # ── Telegram MTProto (leave blank if unused) ──────────────────────────
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
